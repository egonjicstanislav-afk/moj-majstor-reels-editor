<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moj Majstor AI – Reels Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root {
  --bg:#070d1c; --bg2:#0c1529; --bg3:#111e38;
  --accent:#0359ff; --accent-l:#3a7fff; --accent-rgb:3,89,255;
  --bord:#1a2d55; --gray:#8899bb;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:#fff;
  font-family:'Barlow',sans-serif;
  display:flex; height:100vh; overflow:hidden;
}

/* SIDEBAR */
#sidebar {
  width:240px; min-width:240px; background:var(--bg2);
  border-right:1px solid var(--bord);
  display:flex; flex-direction:column; overflow:hidden;
}
#sidebar h1 {
  padding:16px; font-family:'Barlow Condensed',sans-serif;
  font-size:14px; font-weight:900; letter-spacing:1px;
  border-bottom:1px solid var(--bord);
}
#sidebar h1 span { color:var(--accent); }
#tpl-list { overflow-y:auto; flex:1; padding:6px; }
.tb {
  width:100%; padding:9px 10px; margin-bottom:3px;
  background:transparent; border:1px solid transparent;
  border-radius:5px; color:#fff;
  font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
  text-align:left; cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:all .15s;
}
.tb:hover { background:#111e38; border-color:#1a2d55; }
.tb.on { background:rgba(var(--accent-rgb),.18); border-color:var(--accent); color:var(--accent-l); }
.tb .n { font-size:9px; color:#8899bb; width:22px; flex-shrink:0; }
.tb.on .n { color:#3a7fff; }

/* EDITOR */
#epanel {
  width:280px; min-width:280px; background:var(--bg2);
  border-right:1px solid var(--bord);
  display:flex; flex-direction:column; overflow:hidden;
}
#ehead { padding:16px; border-bottom:1px solid var(--bord); }
#etitle { font-family:'Barlow Condensed',sans-serif; font-size:15px; font-weight:900; }
#efields { overflow-y:auto; flex:1; padding:10px; }
.fg { margin-bottom:12px; }
.fg label {
  display:block; font-size:10px; font-weight:700;
  color:#8899bb; text-transform:uppercase; letter-spacing:.4px; margin-bottom:4px;
}
.fg input, .fg textarea {
  width:100%; background:var(--bg3); border:1px solid var(--bord);
  border-radius:5px; color:#fff;
  font-family:'Barlow',sans-serif; font-size:12px; padding:8px 10px;
  outline:none; resize:vertical; transition:border-color .15s;
}
.fg input:focus, .fg textarea:focus { border-color:var(--accent); }
.fg textarea { min-height:58px; }
#dlbtn {
  margin:10px; padding:13px; background:var(--accent); border:none; border-radius:7px;
  color:#fff; font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:900;
  letter-spacing:1px; cursor:pointer; transition:all .2s;
}
#dlbtn:hover { filter:brightness(.85); }
#dlbtn.loading { filter:brightness(.85); pointer-events:none; }

/* THEMES BAR */
#themes-bar {
  padding:8px 10px; border-bottom:1px solid var(--bord);
  display:flex; align-items:center; gap:6px;
}
#themes-bar .tlbl {
  font-size:9px; font-weight:700; color:var(--gray);
  text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; margin-right:2px;
}
#theme-swatches { display:flex; gap:5px; flex:1; }
.tsw {
  width:20px; height:20px; border-radius:50%;
  cursor:pointer; border:2px solid transparent;
  flex-shrink:0; transition:border-color .15s,transform .15s;
}
.tsw:hover { transform:scale(1.2); }
.tsw.on { border-color:#fff; box-shadow:0 0 0 1px rgba(255,255,255,.3); }
#resetpos-btn {
  padding:3px 8px; background:transparent; border:1px solid var(--bord);
  border-radius:4px; color:var(--gray); font-size:11px; cursor:pointer;
  transition:all .15s; white-space:nowrap;
}
#resetpos-btn:hover { border-color:var(--accent); color:var(--accent); }

/* SECTION SEPARATORS */
.section-sep {
  font-size:9px; font-weight:700; color:var(--gray);
  text-transform:uppercase; letter-spacing:.5px;
  padding:10px 0 6px; border-top:1px solid var(--bord); margin-top:8px;
}

/* ELEMENT TOGGLES */
.elem-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:5px 0; gap:8px; border-bottom:1px solid rgba(26,45,85,.5);
}
.elem-lbl {
  font-size:11px; color:rgba(255,255,255,.75);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1;
}
.toggle { position:relative; display:inline-block; width:32px; height:18px; flex-shrink:0; }
.toggle input { opacity:0; width:0; height:0; position:absolute; }
.tog-slider {
  position:absolute; inset:0; background:#2a3550; border-radius:18px;
  cursor:pointer; transition:background .2s;
}
.tog-slider::before {
  content:''; position:absolute; width:12px; height:12px;
  left:3px; top:3px; background:#fff; border-radius:50%; transition:transform .2s;
}
.toggle input:checked + .tog-slider { background:var(--accent); }
.toggle input:checked + .tog-slider::before { transform:translateX(14px); }

/* OVERLAY IMAGES */
.add-img-btn {
  display:block; width:100%; padding:8px; text-align:center;
  border:1px dashed var(--bord); border-radius:5px;
  color:var(--gray); font-size:12px; cursor:pointer; transition:all .15s; margin-top:4px;
}
.add-img-btn:hover { border-color:var(--accent); color:var(--accent); }
.overlay-row {
  display:flex; align-items:center; gap:6px; padding:6px 0;
  border-bottom:1px solid rgba(26,45,85,.5);
}
.overlay-thumb { width:36px; height:36px; object-fit:cover; border-radius:3px; flex-shrink:0; }
.overlay-controls { display:flex; align-items:center; gap:3px; flex:1; }
.overlay-controls button {
  width:22px; height:22px; background:var(--bg3); border:1px solid var(--bord);
  border-radius:4px; color:#fff; font-size:15px; line-height:1;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.overlay-controls button:hover { border-color:var(--accent); }
.overlay-pct { font-size:11px; color:var(--gray); min-width:34px; text-align:center; }
.overlay-del {
  background:transparent; border:none; color:var(--gray);
  cursor:pointer; font-size:15px; padding:2px 4px; line-height:1;
}
.overlay-del:hover { color:#ff4444; }
/* Resize handle on overlay */
.ov-handle {
  position:absolute; bottom:-7px; right:-7px;
  width:14px; height:14px; background:#fff; border-radius:50%;
  border:2px solid var(--accent,#0359ff); cursor:se-resize; z-index:2;
}

/* BACKGROUND SELECTOR */
#bg-bar {
  padding:8px 10px; border-bottom:1px solid var(--bord);
  display:flex; align-items:flex-start; gap:6px; flex-wrap:wrap;
}
#bg-bar .tlbl {
  font-size:9px; font-weight:700; color:var(--gray);
  text-transform:uppercase; letter-spacing:.4px; white-space:nowrap;
  margin-right:2px; padding-top:3px;
}
#bg-thumbs { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
.bgsw {
  width:32px; height:20px; border-radius:3px;
  cursor:pointer; border:2px solid transparent;
  flex-shrink:0; transition:border-color .15s,transform .15s;
  background-size:cover; background-position:center;
}
.bgsw:hover { transform:scale(1.1); }
.bgsw.on { border-color:#fff; }
.bgsw.none { background:#111e38; position:relative; }
.bgsw.none::after { content:'✕'; font-size:10px; color:var(--gray); position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }

/* PREVIEW */
#parea {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#050a16; overflow:hidden; position:relative;
}
#plabel {
  position:absolute; top:12px;
  font-size:10px; color:#8899bb; letter-spacing:1px;
  background:rgba(0,0,0,.5); padding:3px 8px; border-radius:20px;
  pointer-events:none; z-index:10;
}
#pwrap { position:relative; overflow:hidden; box-shadow:0 20px 80px rgba(0,0,0,.8); }
#pcanvas { transform-origin:0 0; }

/* RENDER TARGET */
#trender {
  position:fixed; top:-9999px; left:-9999px; z-index:-1;
  width:1080px; height:1920px; overflow:hidden;
}

::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-thumb { background:var(--bord); border-radius:2px; }
</style>
</head>
<body>

<div id="sidebar">
  <h1>MOJ MAJSTOR <span>AI</span><br><span style="font-weight:400;color:#8899bb;font-size:11px">REELS EDITOR · 1080×1920</span></h1>
  <div id="tpl-list"></div>
</div>

<div id="epanel">
  <div id="ehead"><div id="etitle">–</div></div>
  <div id="themes-bar">
    <span class="tlbl">Tema</span>
    <div id="theme-swatches"></div>
    <button id="resetpos-btn" onclick="resetDrag()" title="Resetuj pozicije elemenata">↺ Reset</button>
  </div>
  <div id="bg-bar">
    <span class="tlbl">Pozadina</span>
    <div id="bg-thumbs"></div>
  </div>
  <div id="efields"></div>
  <button id="dlbtn" onclick="download()">⬇ PREUZMI REELS (1080×1920)</button>
</div>

<div id="parea">
  <div id="plabel">PREVIEW</div>
  <div id="pwrap"><div id="pcanvas"></div></div>
</div>

<div id="trender"></div>

<script>
// ─── COLOURS ─────────────────────────────────────────────────────────
let C = {
  bg:    '#070d1c',
  bg2:   '#0c1529',
  bg3:   '#111e38',
  blue:  '#0359ff',
  bluel: '#3a7fff',
  red:   '#cc1515',
  gray:  '#8899bb',
  bord:  '#1a2d55',
};

// ─── THEMES ───────────────────────────────────────────────────────────
const THEMES = [
  { name:'Plava',      swatch:'#0359ff', blue:'#0359ff', bluel:'#3a7fff', rgb:'3,89,255',
    bg:'#070d1c', bg2:'#0c1529', bg3:'#111e38', bord:'#1a2d55', gray:'#8899bb' },
  { name:'Crvena',     swatch:'#cc1515', blue:'#cc1515', bluel:'#ff4444', rgb:'204,21,21',
    bg:'#0d0305', bg2:'#160608', bg3:'#250b0b', bord:'#3d1010', gray:'#bb9999' },
  { name:'Zelena',     swatch:'#00aa55', blue:'#00aa55', bluel:'#33cc77', rgb:'0,170,85',
    bg:'#030d07', bg2:'#07150d', bg3:'#0d2018', bord:'#0f3a1e', gray:'#88bb99' },
  { name:'Zlatna',     swatch:'#d4900a', blue:'#d4900a', bluel:'#f0b830', rgb:'212,144,10',
    bg:'#0d0900', bg2:'#150f00', bg3:'#221800', bord:'#3a2c00', gray:'#bbaa77' },
  { name:'Ljubičasta', swatch:'#7722dd', blue:'#7722dd', bluel:'#aa55ff', rgb:'119,34,221',
    bg:'#080612', bg2:'#0e0a1e', bg3:'#170f30', bord:'#2d1a55', gray:'#9988bb' },
];
let curTheme = 0;

function applyTheme(idx) {
  curTheme = idx;
  const t = THEMES[idx];
  C.blue  = t.blue;
  C.bluel = t.bluel;
  C.bg    = t.bg;
  C.bg2   = t.bg2;
  C.bg3   = t.bg3;
  C.bord  = t.bord;
  C.gray  = t.gray;
  const r = document.documentElement;
  r.style.setProperty('--bg',        t.bg);
  r.style.setProperty('--bg2',       t.bg2);
  r.style.setProperty('--bg3',       t.bg3);
  r.style.setProperty('--accent',    t.blue);
  r.style.setProperty('--accent-l',  t.bluel);
  r.style.setProperty('--accent-rgb',t.rgb);
  r.style.setProperty('--bord',      t.bord);
  r.style.setProperty('--gray',      t.gray);
  document.querySelectorAll('.tsw').forEach((sw,i) => sw.classList.toggle('on', i===idx));
  renderPreview();
}

function buildThemesBar() {
  const wrap = document.getElementById('theme-swatches');
  THEMES.forEach((t, i) => {
    const sw = document.createElement('div');
    sw.className = 'tsw' + (i===0 ? ' on' : '');
    sw.title = t.name;
    sw.style.background = t.swatch;
    sw.onclick = () => applyTheme(i);
    wrap.appendChild(sw);
  });
}

// ─── BACKGROUNDS ──────────────────────────────────────────────────────
const BACKGROUNDS = [
  { name:'Bez pozadine', src: null },
  { name:'Plavi gradijent', src: 'assets/bg1.jpg' },
  { name:'Circuit board',   src: 'assets/bg2.jpg' },
  { name:'Zvijezde',        src: 'assets/bg3.jpg' },
  { name:'HUD elementi',    src: 'assets/bg4.jpg' },
  { name:'Plavi frame',     src: 'assets/bg5.jpg' },
  { name:'Tamni dijagonale',src: 'assets/bg6.jpg' },
  { name:'Zvijezde konst.', src: 'assets/bg7.jpg' },
  { name:'Circuit 2',       src: 'assets/bg8.jpg' },
  { name:'Plavi gradijent 2',src:'assets/bg9.jpg' },
];
let curBg = 0;

function applyBg(idx) {
  curBg = idx;
  document.querySelectorAll('.bgsw').forEach((sw, i) => sw.classList.toggle('on', i === idx));
  renderPreview();
}

function buildBgBar() {
  const wrap = document.getElementById('bg-thumbs');
  BACKGROUNDS.forEach((bg, i) => {
    const sw = document.createElement('div');
    sw.className = 'bgsw' + (i === 0 ? ' on' : '') + (bg.src ? '' : ' none');
    sw.title = bg.name;
    if (bg.src) sw.style.backgroundImage = `url('${bg.src}')`;
    sw.onclick = () => applyBg(i);
    wrap.appendChild(sw);
  });
}

// ─── DRAG ─────────────────────────────────────────────────────────────
const dragPos = {}; // { tplId: { elIndex: {x, y} } }

function getScale() {
  const m = document.getElementById('pcanvas').style.transform.match(/scale\(([\d.]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}

function findContentContainer(root) {
  const divs = root.querySelectorAll('div');
  for (const d of divs) {
    const p = d.style.padding;
    if (p && p.includes('90px') && d.children.length >= 2) return d;
  }
  // Fallback: z-index:1 or z-index:2 content wrapper → first child
  for (const d of divs) {
    if ((d.style.zIndex === '1' || d.style.zIndex === '2') && d.firstElementChild) {
      const fc = d.firstElementChild;
      if (fc.children.length >= 2) return fc;
    }
  }
  return null;
}

function makeDraggable() {
  const pc = document.getElementById('pcanvas');
  const root = pc.firstElementChild;
  if (!root) return;
  const container = findContentContainer(root);
  if (!container) return;
  if (!dragPos[cur]) dragPos[cur] = {};

  Array.from(container.children).forEach((el, i) => {
    const saved = dragPos[cur][i] || {x:0, y:0};
    el.style.position  = 'relative';
    el.style.transform = `translate(${saved.x}px,${saved.y}px)`;
    el.style.cursor    = 'grab';
    el.style.userSelect = 'none';

    el.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      e.preventDefault(); e.stopPropagation();
      const scale  = getScale();
      const sx     = e.clientX, sy = e.clientY;
      const ox     = (dragPos[cur][i] || {x:0}).x;
      const oy     = (dragPos[cur][i] || {y:0}).y;
      el.style.cursor = 'grabbing';
      el.style.zIndex = '999';

      const onMove = (e) => {
        const nx = ox + (e.clientX - sx) / scale;
        const ny = oy + (e.clientY - sy) / scale;
        dragPos[cur][i] = {x: nx, y: ny};
        el.style.transform = `translate(${nx}px,${ny}px)`;
      };
      const onUp = () => {
        el.style.cursor = 'grab';
        el.style.zIndex = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function resetDrag() {
  dragPos[cur] = {};
  renderPreview();
}

// ─── ELEMENT VISIBILITY ───────────────────────────────────────────────
const elemVisibility = {}; // { tplId: { elIndex: bool } }

function initElemVisibility() {
  if (elemVisibility[cur]) return;
  const pc = document.getElementById('pcanvas');
  const root = pc.firstElementChild;
  if (!root) return;
  const container = findContentContainer(root);
  if (!container) return;
  elemVisibility[cur] = {};
  Array.from(container.children).forEach((_, i) => { elemVisibility[cur][i] = true; });
}

function buildElementToggles() {
  const panel = document.getElementById('elem-panel');
  if (!panel) return;
  panel.innerHTML = '';
  const pc = document.getElementById('pcanvas');
  const root = pc.firstElementChild;
  if (!root) return;
  const container = findContentContainer(root);
  if (!container) return;
  if (!elemVisibility[cur]) initElemVisibility();

  Array.from(container.children).forEach((el, i) => {
    const rawText = el.textContent.trim().replace(/\s+/g,' ');
    const label = rawText.length > 22 ? rawText.substring(0,22)+'…' : (rawText || `Blok ${i+1}`);
    const row = document.createElement('div');
    row.className = 'elem-row';
    const lbl = document.createElement('span');
    lbl.className = 'elem-lbl'; lbl.textContent = label;
    const tog = document.createElement('label');
    tog.className = 'toggle';
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.checked = elemVisibility[cur][i] !== false;
    chk.onchange = () => {
      elemVisibility[cur][i] = chk.checked;
      applyVisibility();
    };
    const slider = document.createElement('span');
    slider.className = 'tog-slider';
    tog.appendChild(chk); tog.appendChild(slider);
    row.appendChild(lbl); row.appendChild(tog);
    panel.appendChild(row);
  });
}

function applyVisibility() {
  const pc = document.getElementById('pcanvas');
  const root = pc.firstElementChild;
  if (!root) return;
  const container = findContentContainer(root);
  if (!container || !elemVisibility[cur]) return;
  Array.from(container.children).forEach((el, i) => {
    el.style.visibility = elemVisibility[cur][i] !== false ? '' : 'hidden';
  });
}

// ─── OVERLAY IMAGES ───────────────────────────────────────────────────
const overlayImages = {}; // { tplId: [{id, src, x, y, w, scale}] }
let overlayCounter = 0;

function addOverlayImage(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const tempImg = new Image();
    tempImg.onload = () => {
      if (!overlayImages[cur]) overlayImages[cur] = [];
      const natW = tempImg.naturalWidth || 400;
      const initScale = Math.min(1, 500 / natW);
      overlayImages[cur].push({ id: ++overlayCounter, src: e.target.result, x: 290, y: 700, w: natW, scale: initScale });
      renderOverlays();
      buildOverlayPanel();
    };
    tempImg.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderOverlays() {
  const pc = document.getElementById('pcanvas');
  const root = pc.firstElementChild;
  if (!root) return;
  const existing = root.querySelector('#overlay-layer');
  if (existing) existing.remove();
  const imgs = overlayImages[cur] || [];
  if (!imgs.length) return;

  const layer = document.createElement('div');
  layer.id = 'overlay-layer';
  layer.style.cssText = 'position:absolute;inset:0;z-index:50;pointer-events:none;';

  imgs.forEach(img => {
    const w = Math.round(img.w * img.scale);
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `position:absolute;left:${Math.round(img.x)}px;top:${Math.round(img.y)}px;width:${w}px;pointer-events:all;cursor:grab;user-select:none;`;
    wrapper.dataset.ovId = img.id;

    const imgEl = document.createElement('img');
    imgEl.src = img.src; imgEl.style.cssText = 'width:100%;display:block;pointer-events:none;';
    wrapper.appendChild(imgEl);

    // Resize corner handle
    const handle = document.createElement('div');
    handle.className = 'ov-handle';
    wrapper.appendChild(handle);

    // Drag to move
    wrapper.addEventListener('mousedown', (e) => {
      if (e.target === handle) return;
      e.preventDefault(); e.stopPropagation();
      const sc = getScale(), sx = e.clientX, sy = e.clientY, ox = img.x, oy = img.y;
      wrapper.style.cursor = 'grabbing';
      const onMove = (e) => {
        img.x = ox + (e.clientX - sx) / sc;
        img.y = oy + (e.clientY - sy) / sc;
        wrapper.style.left = Math.round(img.x) + 'px';
        wrapper.style.top  = Math.round(img.y) + 'px';
      };
      const onUp = () => { wrapper.style.cursor = 'grab'; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    // Drag handle to resize
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault(); e.stopPropagation();
      const sc = getScale(), sx = e.clientX, startW = img.w * img.scale;
      const onMove = (e) => {
        const newW = Math.max(30, startW + (e.clientX - sx) / sc);
        img.scale = newW / img.w;
        wrapper.style.width = Math.round(newW) + 'px';
        const panel = document.getElementById('overlay-panel');
        if (panel) {
          const pctEl = panel.querySelector(`[data-pct="${img.id}"]`);
          if (pctEl) pctEl.textContent = Math.round(img.scale * 100) + '%';
        }
      };
      const onUp = () => { buildOverlayPanel(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });

    layer.appendChild(wrapper);
  });

  root.appendChild(layer);
}

function buildOverlayPanel() {
  const panel = document.getElementById('overlay-panel');
  if (!panel) return;
  panel.innerHTML = '';
  const imgs = overlayImages[cur] || [];
  imgs.forEach(img => {
    const row = document.createElement('div');
    row.className = 'overlay-row';
    const thumb = document.createElement('img');
    thumb.src = img.src; thumb.className = 'overlay-thumb';
    const ctrl = document.createElement('div');
    ctrl.className = 'overlay-controls';
    const btnM = document.createElement('button'); btnM.textContent = '−';
    btnM.onclick = () => { img.scale = Math.max(0.05, img.scale * 0.85); renderOverlays(); buildOverlayPanel(); };
    const pct = document.createElement('span');
    pct.className = 'overlay-pct'; pct.dataset.pct = img.id;
    pct.textContent = Math.round(img.scale * 100) + '%';
    const btnP = document.createElement('button'); btnP.textContent = '+';
    btnP.onclick = () => { img.scale = Math.min(6, img.scale * 1.15); renderOverlays(); buildOverlayPanel(); };
    ctrl.appendChild(btnM); ctrl.appendChild(pct); ctrl.appendChild(btnP);
    const del = document.createElement('button');
    del.className = 'overlay-del'; del.textContent = '✕';
    del.onclick = () => { overlayImages[cur] = overlayImages[cur].filter(i => i.id !== img.id); renderOverlays(); buildOverlayPanel(); };
    row.appendChild(thumb); row.appendChild(ctrl); row.appendChild(del);
    panel.appendChild(row);
  });
}

// ─── STRIPE DOM LINES (html2canvas-safe: real divs, no background-image) ───
function stripeLines(color='rgba(255,255,255,0.045)') {
  const w = 1080, h = 1920, gap = 58;
  const diag = Math.ceil(Math.sqrt(w*w + h*h));
  const count = Math.ceil((w + h) / gap) + 4;
  let html = '';
  for (let i = -2; i < count; i++) {
    const offset = i * gap;
    html += `<div style="position:absolute;left:${offset - diag/2}px;top:${h/2}px;width:${diag}px;height:2px;background:${color};transform:rotate(-45deg);transform-origin:left center;pointer-events:none"></div>`;
  }
  return `<div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0">${html}</div>`;
}

// ─── SHARED ELEMENTS ─────────────────────────────────────────────────
function accentRgba(opacity) {
  const h = C.blue.replace('#','');
  const r = parseInt(h.substring(0,2),16), g = parseInt(h.substring(2,4),16), b = parseInt(h.substring(4,6),16);
  return `rgba(${r},${g},${b},${opacity})`;
}

function logo(scale=1) {
  const s = (n) => Math.round(n*scale)+'px';
  return `<div style="display:inline-flex;align-items:center;gap:${s(10)};background:${C.bord};border-radius:${s(50)};padding:${s(8)} ${s(20)} ${s(8)} ${s(8)}">
    <img src="${LOGO_B64}" style="width:${s(38)};height:${s(38)};border-radius:50%;display:block;flex-shrink:0" />
    <span style="font-family:'Barlow Condensed',sans-serif;font-size:${s(20)};font-weight:800;color:#fff">Moj Majstor</span>
    <span style="background:${C.blue};color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:${s(10)};font-weight:900;padding:${s(2)} ${s(6)};border-radius:${s(4)}">AI</span>
  </div>`;
}

function badge(text, bg=C.blue) {
  return `<div style="display:inline-flex;align-items:center;background:${bg};border-radius:50px;padding:12px 26px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:1px">${text}</div>`;
}

function cta(text, bg=C.blue, color='#fff') {
  return `<div style="display:inline-flex;align-items:center;background:${bg};border-radius:14px;padding:28px 52px;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:${color};letter-spacing:1px;text-transform:uppercase">${text}</div>`;
}

function storeBadge(icon, text) {
  return `<div style="display:inline-flex;align-items:center;gap:10px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;padding:14px 24px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:#fff">${icon} ${text}</div>`;
}

function starsRow(n=5) {
  n = Math.max(0, Math.min(5, parseInt(n)||5));
  return [...Array(5)].map((_,i)=>`<span style="color:${i<n?'#ffd700':'#2a3550'}"">★</span>`).join('');
}

// wrapper for full-size template
function tplWrap(bg, stripeColor, content) {
  const bgImg = (typeof curBg !== 'undefined' && BACKGROUNDS[curBg] && BACKGROUNDS[curBg].src)
    ? `<div style="position:absolute;inset:0;background-image:url('${BACKGROUNDS[curBg].src}');background-size:cover;background-position:center;z-index:0;pointer-events:none"></div>
       <div style="position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:0;pointer-events:none"></div>`
    : '';
  return `<div style="width:1080px;height:1920px;background:${bg};position:relative;overflow:hidden;font-family:'Barlow Condensed',sans-serif">
    ${bgImg}
    ${stripeLines(stripeColor)}
    <div style="position:relative;z-index:1;width:1080px;height:1920px">
      ${content}
    </div>
  </div>`;
}

    {id:"badge",   l:"Badge tekst",      def:"ZNATE LI?"},
    {id:"question",l:"Pitanje (headline)",def:"KOLIKO TRAJE\nPROSJEČAN\nSERVIS KLIME?", ta:true},
    {id:"ans1n",   l:"Odgovor 1 broj",   def:"1-2h"},
    {id:"ans1l",   l:"Odgovor 1 opis",   def:"S pravim majstorom"},
    {id:"ans2n",   l:"Odgovor 2 broj",   def:"3-5h"},
    {id:"ans2l",   l:"Odgovor 2 opis",   def:"Bez pravog majstora"},
    {id:"cta",     l:"CTA dugme",        def:"NAĐI MAJSTORA ZA KLIMU →"},
  ]},
  12: { name:"DOWNLOAD CTA BOLD",      build:T12, fields:[
    {id:"h1",  l:"Headline 1",  def:"PREUZMI"},
    {id:"h2",  l:"Headline 2",  def:"ODMAH."},
    {id:"tag", l:"Tagline",     def:"BESPLATNO. BEZ ČEKANJA."},
    {id:"body",l:"Body tekst",  def:"Dostupno na Google Play i App Store.\nPovežite se s majstorom za manje od minute.", ta:true},
    {id:"cta", l:"CTA dugme",   def:"PREUZMI APLIKACIJU →"},
  ]},
};

// ─── STATE ────────────────────────────────────────────────────────────
let cur = 1;
const vals = {};
Object.keys(TPLS).forEach(k => {
  vals[k] = {};
  TPLS[k].fields.forEach(f => { vals[k][f.id] = f.def; });
});

// ─── BUILD SIDEBAR ────────────────────────────────────────────────────
(function buildSidebar() {
  const list = document.getElementById('tpl-list');
  Object.keys(TPLS).forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'tb' + (k==1?' on':'');
    btn.innerHTML = `<span class="n">T${String(k).padStart(2,'0')}</span>${TPLS[k].name}`;
    btn.onclick = () => select(parseInt(k));
    list.appendChild(btn);
  });
})();

// ─── SELECT ───────────────────────────────────────────────────────────
function select(n) {
  cur = n;
  document.querySelectorAll('.tb').forEach((b,i) => b.classList.toggle('on', i===n-1));
  document.getElementById('etitle').textContent = TPLS[n].name;
  buildFields();
  renderPreview();
  initElemVisibility();
  buildElementToggles();
  buildOverlayPanel();
}

// ─── FIELDS ───────────────────────────────────────────────────────────
function buildFields() {
  const c = document.getElementById('efields');
  c.innerHTML = '';

  // Text fields
  TPLS[cur].fields.forEach(f => {
    const d = document.createElement('div');
    d.className = 'fg';
    const lbl = document.createElement('label');
    lbl.textContent = f.l;
    d.appendChild(lbl);
    const inp = f.ta ? document.createElement('textarea') : document.createElement('input');
    if (!f.ta) inp.type = 'text';
    inp.value = vals[cur][f.id];
    inp.oninput = () => { vals[cur][f.id] = inp.value; renderPreview(); };
    d.appendChild(inp);
    c.appendChild(d);
  });

  // Element toggles section
  const sep1 = document.createElement('div');
  sep1.className = 'section-sep';
  sep1.textContent = 'ELEMENTI';
  c.appendChild(sep1);
  const ep = document.createElement('div');
  ep.id = 'elem-panel';
  c.appendChild(ep);

  // Overlay images section
  const sep2 = document.createElement('div');
  sep2.className = 'section-sep';
  sep2.textContent = 'SLIKE / PNG';
  c.appendChild(sep2);
  const addBtn = document.createElement('label');
  addBtn.className = 'add-img-btn';
  addBtn.textContent = '＋ Dodaj sliku / PNG';
  const fileInp = document.createElement('input');
  fileInp.type = 'file'; fileInp.accept = 'image/*'; fileInp.style.display = 'none';
  fileInp.onchange = (e) => { if (e.target.files[0]) addOverlayImage(e.target.files[0]); fileInp.value=''; };
  addBtn.appendChild(fileInp);
  c.appendChild(addBtn);
  const op = document.createElement('div');
  op.id = 'overlay-panel';
  c.appendChild(op);
}

// ─── PREVIEW ──────────────────────────────────────────────────────────
function renderPreview() {
  const html = TPLS[cur].build(vals[cur]);
  document.getElementById('pcanvas').innerHTML = html;
  updateScale();
  makeDraggable();
  applyVisibility();
  renderOverlays();
}

function updateScale() {
  const pa = document.getElementById('parea');
  const pw = document.getElementById('pwrap');
  const pc = document.getElementById('pcanvas');
  const scale = Math.min((pa.clientHeight - 60) / 1920, (pa.clientWidth - 40) / 1080);
  pw.style.width  = Math.round(1080*scale)+'px';
  pw.style.height = Math.round(1920*scale)+'px';
  pc.style.transform = `scale(${scale})`;
  pc.style.width  = '1080px';
  pc.style.height = '1920px';
}

// ─── DOWNLOAD ─────────────────────────────────────────────────────────
async function download() {
  const btn = document.getElementById('dlbtn');
  btn.classList.add('loading');
  btn.textContent = '⏳ GENERIŠEM...';

  // Render in hidden div
  const html = TPLS[cur].build(vals[cur]);
  const tr = document.getElementById('trender');
  tr.innerHTML = html;
  const el = tr.firstElementChild;

  // Apply element visibility
  const rContainer = findContentContainer(el);
  if (rContainer && elemVisibility[cur]) {
    Array.from(rContainer.children).forEach((child, i) => {
      if (elemVisibility[cur][i] === false) child.style.visibility = 'hidden';
    });
  }

  // Inject overlay images
  const imgs = overlayImages[cur] || [];
  if (imgs.length) {
    const layer = document.createElement('div');
    layer.style.cssText = 'position:absolute;inset:0;z-index:50;pointer-events:none;';
    imgs.forEach(img => {
      const w = Math.round(img.w * img.scale);
      const wrapper = document.createElement('div');
      wrapper.style.cssText = `position:absolute;left:${Math.round(img.x)}px;top:${Math.round(img.y)}px;width:${w}px;`;
      const imgEl = document.createElement('img');
      imgEl.src = img.src; imgEl.style.width = '100%'; imgEl.crossOrigin = 'anonymous';
      wrapper.appendChild(imgEl);
      layer.appendChild(wrapper);
    });
    el.appendChild(layer);
  }

  // Wait for fonts + images
  await document.fonts.ready;
  await Promise.all([
    document.fonts.load('900 28px "Barlow Condensed"'),
    document.fonts.load('800 44px "Barlow Condensed"'),
    document.fonts.load('700 13px "Barlow Condensed"'),
  ]);
  await new Promise(r => setTimeout(r, 1200));

  try {
    const canvas = await html2canvas(el, {
      width: 1080,
      height: 1920,
      scale: 1,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#070d1c',
      logging: false,
      imageTimeout: 0,
    });

    const a = document.createElement('a');
    const name = TPLS[cur].name.toLowerCase().replace(/[^a-z0-9]+/g,'_');
    a.download = `moj-majstor-${name}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  } catch(e) {
    alert('Greška: ' + e.message);
  }

  btn.classList.remove('loading');
  btn.textContent = '⬇ PREUZMI REELS (1080×1920)';
}

// ─── INIT ─────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  buildThemesBar();
  buildBgBar();
  select(1);
  window.addEventListener('resize', updateScale);
});
</script>
